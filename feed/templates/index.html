<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo"><i data-lucide="twitter"></i></div>
            <a href="#"><i data-lucide="home"></i> <span>Kezdőlap</span></a>
            <a href="#"><i data-lucide="hash"></i> <span>Felfedezés</span></a>
            <a href="#"><i data-lucide="bell"></i> <span>Értesítések</span></a>
            <a href="#"><i data-lucide="user"></i> <span>Profil</span></a>
            <button class="tweet-btn-large">Tweet</button>
            <form class="logout-form" action="/logout/" method="post">
                {% csrf_token %}
                <button class="btn btn-ghost" type="submit">
                    <i data-lucide="log-out" size="18"></i>
                    <span>Kijelentkezés</span>
                </button>
            </form>
        </nav>

        <main class="feed">
            <header><h2>Kezdőlap</h2></header>
            
            <div class="tweet-input-box">
                <div class="avatar"></div>
                <div class="input-area">
                    <textarea id="tweet-text" placeholder="Mi történik éppen?"></textarea>
                    <div class="actions">
                        <div class="icons">
                            <i data-lucide="image"></i>
                            <i data-lucide="smile"></i>
                        </div>
                        <button id="post-btn" disabled>Tweet</button>
                    </div>
                </div>
            </div>

            <div id="tweet-list">
            </div>
        </main>

        <aside class="widgets">
            <div class="trending">
                <h3>Trendek neked</h3>
                <div class="trend-item"><small>Technológia · Trending</small><p>#Django</p></div>
                <div class="trend-item"><small>Web · Trending</small><p>#PythonClone</p></div>
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/static/script.js"></script>
</body>
</html>
