<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció · Twitter Clone</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-title">Fiók létrehozása</div>
                <div class="auth-subtitle">Csatlakozz és kezdj el posztolni.</div>
            </div>

            {% if form.non_field_errors %}
                <div class="alert alert-error">{{ form.non_field_errors }}</div>
            {% endif %}

            <form method="post" class="auth-form">
                {% csrf_token %}

                <label class="field">
                    <span class="label">Felhasználónév</span>
                    {{ form.username }}
                    {% if form.username.errors %}
                        <span class="error">{{ form.username.errors }}</span>
                    {% endif %}
                </label>

                <label class="field">
                    <span class="label">Jelszó</span>
                    {{ form.password1 }}
                    {% if form.password1.errors %}
                        <span class="error">{{ form.password1.errors }}</span>
                    {% endif %}
                </label>

                <label class="field">
                    <span class="label">Jelszó (újra)</span>
                    {{ form.password2 }}
                    {% if form.password2.errors %}
                        <span class="error">{{ form.password2.errors }}</span>
                    {% endif %}
                </label>

                <button class="btn btn-primary" type="submit">Regisztráció</button>
            </form>

            <div class="auth-footer">
                Van már fiókod? <a class="link" href="/login/">Bejelentkezés</a>
            </div>
        </div>
    </div>
</body>
</html>
